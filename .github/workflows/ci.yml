name: CI/CD — Backend API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: LaPlateformeDeLemploiAPI/LaPlateformeDeLemploiAPI.csproj

jobs:
  # ──────────────────────────────────────────────
  # 1. Build
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish pour IIS
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 2. Tests
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: windows-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Run tests
        run: dotnet test --configuration Release --verbosity normal
        continue-on-error: true

  # ──────────────────────────────────────────────
  # 3. Security audit
  # ──────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check vulnerable packages
        run: dotnet list ${{ env.PROJECT_PATH }} package --vulnerable --include-transitive
        continue-on-error: true

  # ──────────────────────────────────────────────
  # 4. Code format
  # ──────────────────────────────────────────────
  format:
    name: Code Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check format
        run: dotnet format ${{ env.PROJECT_PATH }} --verify-no-changes --verbosity diagnostic
        continue-on-error: true

  # ──────────────────────────────────────────────
  # 5. Deploy sur IIS via WebDeploy
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy IIS (WebDeploy)
    runs-on: windows-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.plateforme-emploi.fr
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: publish/

      - name: Deploy via WebDeploy (MSDeploy)
        shell: cmd
        run: >
          "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          -verb:sync
          -source:contentPath="%CD%\publish"
          -dest:contentPath="${{ secrets.IIS_SITE_NAME }}",
          computerName="https://${{ secrets.IIS_SERVER_NAME }}:8172/msdeploy.axd",
          userName="${{ secrets.IIS_USERNAME }}",
          password="${{ secrets.IIS_PASSWORD }}",
          authType="Basic"
          -enableRule:AppOffline
          -allowUntrusted
          -retryAttempts:3
          -retryInterval:3000

      - name: Verify deployment
        shell: pwsh
        run: |
          Start-Sleep -Seconds 10
          try {
            $response = Invoke-WebRequest -Uri "https://api.plateforme-emploi.fr/api/joboffers/stats" -UseBasicParsing -TimeoutSec 30
            if ($response.StatusCode -eq 200) {
              Write-Host "API OK — Status 200"
            } else {
              Write-Warning "API responded with $($response.StatusCode)"
            }
          } catch {
            Write-Warning "Health check failed: $_"
          }
